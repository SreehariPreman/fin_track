<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Fin Track{% endblock %}</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 720px; margin: 0 auto; padding: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .flash { padding: 0.5rem 0.75rem; margin-bottom: 1rem; border-radius: 6px; background: #f3f4f6; color: #374151; }
    .flash.error { background: #fef2f2; color: #b91c1c; }
    .flash.success { background: #f0fdf4; color: #166534; }
    table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid #e5e7eb; }
    th { font-weight: 600; color: #374151; }
    .amount { font-variant-numeric: tabular-nums; }
    .snippet { font-size: 0.875rem; color: #6b7280; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    form.inline { display: inline; }
    select { padding: 0.35rem 0.5rem; border: 1px solid #d1d5db; border-radius: 4px; margin-right: 0.25rem; }
    button, .btn { padding: 0.4rem 0.75rem; border-radius: 4px; border: 1px solid #d1d5db; background: #f9fafb; cursor: pointer; font-size: 0.875rem; }
    button.primary, .btn.primary { background: #2563eb; color: white; border-color: #2563eb; }
    .actions { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .add-category { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #e5e7eb; }
    .add-category input { padding: 0.35rem 0.5rem; border: 1px solid #d1d5db; border-radius: 4px; margin-right: 0.25rem; width: 180px; }
    .no-data { color: #6b7280; padding: 1rem 0; }
    .row-link { cursor: pointer; }
    .row-link a { text-decoration: none; color: inherit; }
  </style>
</head>
<body>
  <h1>Fin Track</h1>
  <nav style="margin-bottom: 1rem;">
    <a href="{{ url_for('index') }}">Transactions</a>
    &nbsp;|&nbsp;
    <a href="{{ url_for('categories_view') }}">View by category</a>
  </nav>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
  <script>
    document.querySelectorAll('.row-link[data-href]').forEach(function(row) {
      row.addEventListener('click', function(e) {
        if (e.target.closest('a') || e.target.closest('form') || e.target.closest('button') || e.target.closest('select')) return;
        window.location = row.getAttribute('data-href');
      });
    });
  </script>
</body>
</html>
